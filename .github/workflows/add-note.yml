name: Add Note to Paper

on:
  workflow_dispatch:
    inputs:
      paper_filename:
        description: 'Paper filename (e.g. 2026-01-08-rl-awb-....md)'
        required: true
        type: string
      note_text:
        description: 'Note text content'
        required: true
        type: string

permissions:
  contents: write

jobs:
  add-note:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append note to paper front matter
        env:
          NOTE_TEXT: ${{ inputs.note_text }}
        run: |
          FILENAME="${{ inputs.paper_filename }}"

          # Security: reject path traversal
          if echo "$FILENAME" | grep -qE '[/\\]|\.\.'; then
            echo "Error: Invalid filename" >&2
            exit 1
          fi

          FILEPATH="content/papers/${FILENAME}"
          if [ ! -f "$FILEPATH" ]; then
            echo "Error: File not found: ${FILEPATH}" >&2
            exit 1
          fi

          # Use Python to safely modify YAML front matter
          python3 - "$FILEPATH" <<'PYEOF'
import sys, os, datetime, re

filepath = sys.argv[1]
note_text = os.environ['NOTE_TEXT']

with open(filepath, 'r', encoding='utf-8') as f:
    content = f.read()

# Split on --- delimiters (front matter is between first two ---)
match = re.match(r'^---\n(.*?\n)---\n(.*)$', content, re.DOTALL)
if not match:
    print("Error: Could not parse front matter", file=sys.stderr)
    sys.exit(1)

fm_text = match.group(1)
body = match.group(2)

# Build the new note entry
now = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
# Escape text for YAML: use literal block scalar for multi-line or quotes for single-line
note_text_escaped = note_text.replace('\\', '\\\\').replace('"', '\\"')
note_entry = f'  - text: "{note_text_escaped}"\n    date: "{now}"'

# Check if notes array already exists
if re.search(r'^notes:', fm_text, re.MULTILINE):
    # Append to existing notes array
    # Find the last line of the notes array and append after it
    lines = fm_text.split('\n')
    result = []
    in_notes = False
    inserted = False
    for i, line in enumerate(lines):
        if line.startswith('notes:'):
            in_notes = True
            result.append(line)
            continue
        if in_notes:
            # Still inside notes array if line starts with '  -' or '    '
            if line.startswith('  -') or line.startswith('    '):
                result.append(line)
                continue
            else:
                # End of notes array - insert new note before this line
                result.append(note_entry)
                in_notes = False
                inserted = True
        result.append(line)
    if in_notes and not inserted:
        # notes was the last field
        result.append(note_entry)
    fm_text = '\n'.join(result)
else:
    # Add notes field at the end of front matter
    fm_text = fm_text.rstrip('\n') + '\nnotes:\n' + note_entry + '\n'

output = '---\n' + fm_text + '---\n' + body

with open(filepath, 'w', encoding='utf-8') as f:
    f.write(output)

print(f"Note added successfully to {filepath}")
PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/papers/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          FILENAME="${{ inputs.paper_filename }}"
          git commit -m "Add note to: ${FILENAME}"
          git push
